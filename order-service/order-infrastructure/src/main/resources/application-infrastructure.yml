spring:
  datasource:
    url: jdbc:h2:mem:timesale;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

product:
  base_url: http://localhost:8081/

grpc:
  client:
    product-server:
      address: static://localhost:9090
      negotiation-type: plaintext

kafka:
  bootstrap-servers: localhost:9092
  producer:
    enabled: true